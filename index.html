<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 微博</title>
    <style>
        /* 全局样式重置：统一盒模型、清除默认边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif; /* 统一字体 */
        }

        /* 页面主体样式：背景色 + 垂直水平居中 */
        body {
            background-color: #f5f6f7; /* 浅灰色背景 */
            display: flex; /* Flex布局实现居中 */
            justify-content: center; /* 水平居中 */
            align-items: center; /* 垂直居中 */
            min-height: 100vh; /* 高度占满视口 */
            padding: 20px; /* 防止内容贴边 */
            margin: 0;
        }

        /* 登录容器样式：白色卡片 + 阴影 */
        .login-box {
            width: 600px; /* 固定宽度 */
            min-height: 400px; /* 最小高度，自适应内容 */
            background: #fff; /* 白色背景 */
            border-radius: 12px; /* 圆角 */
            box-shadow: 0 0 10px rgba(0,0,0,0.05); /* 轻微阴影 */
            display: flex; /* 内部左右分栏 */
            padding: 30px; /* 内边距 */
            overflow: hidden; /* 隐藏溢出内容 */
        }

        /* 左侧二维码区域 */
        .left {
            width: 50%; /* 占容器50%宽度 */
            text-align: center; /* 文字居中 */
            padding-right: 20px; /* 右侧内边距 */
            display: flex; /* Flex布局垂直居中内部元素 */
            flex-direction: column; /* 垂直排列 */
            justify-content: center; /* 垂直居中 */
            align-items: center; /* 水平居中 */
        }

        /* 微博logo样式 */
        .left .logo {
            font-size: 20px; /* 字体大小 */
            color: #e6162d; /* 微博红色 */
            margin-bottom: 20px; /* 底部外边距 */
            display: flex; /* Flex布局对齐图标和文字 */
            align-items: center; /* 垂直对齐 */
            justify-content: center; /* 水平居中 */
            gap: 6px; /* 图标和文字间距 */
        }

        /* logo前的红色圆形图标 */
        .left .logo::before {
            content: ""; /* 空内容 */
            width: 24px; /* 宽度 */
            height: 24px; /* 高度 */
            background: #e6162d; /* 红色背景 */
            border-radius: 50%; /* 圆形 */
        }

        /* 二维码标题 */
        .left .title {
            font-size: 16px; /* 字体大小 */
            color: #666; /* 灰色文字 */
            margin-bottom: 20px; /* 底部外边距 */
        }

        /* 二维码容器：替换为微信二维码图片 */
        .left .qrcode {
            width: 160px; /* 二维码宽度 */
            height: 160px; /* 二维码高度 */
            margin: 0 auto 20px; /* 居中 + 底部外边距 */
            display: flex; /* Flex布局 */
            align-items: center; /* 垂直居中 */
            justify-content: center; /* 水平居中 */
            overflow: hidden; /* 隐藏溢出 */
            border-radius: 8px; /* 轻微圆角 */
        }

        /* 二维码图片样式：适配容器 */
        .left .qrcode img {
            width: 100%; /* 宽度100% */
            height: 100%; /* 高度100% */
            object-fit: cover; /* 保持比例 */
        }

        /* 个人信息展示区域样式 */
        .left .user-info {
            margin-top: 15px; /* 与二维码提示文字的间距 */
            padding: 10px 15px; /* 内边距 */
            background-color: #f8f9fa; /* 浅灰色背景，区分区域 */
            border-radius: 8px; /* 圆角 */
            width: 100%; /* 占满左侧区域宽度 */
            text-align: left; /* 文字左对齐 */
        }

        /* 个人信息标题样式 */
        .left .user-info .info-title {
            font-size: 12px; /* 小字体 */
            color: #999; /* 浅灰色 */
            margin-bottom: 5px; /* 底部间距 */
        }

        /* 学号和姓名样式 */
        .left .user-info .info-content {
            font-size: 14px; /* 正常字体大小 */
            color: #333; /* 黑色文字 */
            line-height: 1.6; /* 行高，提升可读性 */
        }

        /* 二维码提示文字 */
        .left .tip {
            font-size: 12px; /* 小字体 */
            color: #999; /* 浅灰色 */
            margin-bottom: 15px; /* 底部外边距，给新增信息区域留空间 */
        }

        /* 右侧登录表单区域 */
        .right {
            width: 50%; /* 占容器50%宽度 */
            padding-left: 20px; /* 左侧内边距 */
            border-left: 1px solid #eee; /* 分隔线 */
            display: flex; /* Flex布局垂直居中 */
            flex-direction: column; /* 垂直排列 */
            justify-content: center; /* 垂直居中 */
        }

        /* 登录选项卡 */
        .tab {
            display: flex; /* 横向排列 */
            gap: 20px; /* 选项间距 */
            margin-bottom: 20px; /* 底部外边距 */
        }

        /* 选项卡文字样式 */
        .tab span {
            font-size: 16px; /* 字体大小 */
            color: #333; /* 黑色文字 */
            padding-bottom: 6px; /* 底部内边距 */
            cursor: pointer; /* 鼠标指针变为手型 */
        }

        /* 激活的选项卡样式 */
        .tab span.active {
            color: #e6162d; /* 红色文字 */
            border-bottom: 2px solid #e6162d; /* 红色下划线 */
        }

        /* 表单元素容器 */
        .form-item {
            margin-bottom: 16px; /* 底部外边距 */
        }

        /* 输入框样式 */
        .form-item input {
            width: 100%; /* 宽度100% */
            height: 40px; /* 高度 */
            border: 1px solid #eee; /* 浅灰色边框 */
            border-radius: 6px; /* 圆角 */
            padding: 0 12px; /* 左右内边距 */
            outline: none; /* 去除默认聚焦边框 */
            font-size: 14px; /* 字体大小 */
        }

        /* 验证码输入框 + 按钮容器 */
        .form-item .code-box {
            display: flex; /* 横向排列 */
            gap: 10px; /* 输入框和按钮间距 */
        }

        /* 验证码输入框占满剩余空间 */
        .form-item .code-box input {
            flex: 1;
        }

        /* 获取验证码按钮 */
        .form-item .code-box button {
            width: 100px; /* 固定宽度 */
            height: 40px; /* 高度 */
            border: none; /* 去除边框 */
            background: #fff; /* 白色背景 */
            color: #e6162d; /* 红色文字 */
            border-radius: 6px; /* 圆角 */
            cursor: pointer; /* 鼠标指针变为手型 */
            font-size: 14px; /* 字体大小 */
        }

        /* 登录/注册按钮 */
        .submit-btn {
            width: 100%; /* 宽度100% */
            height: 44px; /* 高度 */
            background: #ff8200; /* 橙色背景 */
            color: #fff; /* 白色文字 */
            border: none; /* 去除边框 */
            border-radius: 22px; /* 圆形按钮 */
            font-size: 16px; /* 字体大小 */
            margin-bottom: 16px; /* 底部外边距 */
            cursor: pointer; /* 鼠标指针变为手型 */
        }

        /* 用户协议提示文字 */
        .agreement {
            font-size: 12px; /* 小字体 */
            color: #999; /* 浅灰色 */
            line-height: 1.5; /* 行高 */
            margin-bottom: 20px; /* 底部外边距 */
        }

        /* 微信登录选项 */
        .wechat-login {
            display: flex; /* Flex布局对齐图标和文字 */
            align-items: center; /* 垂直对齐 */
            justify-content: center; /* 水平居中 */
            gap: 6px; /* 图标和文字间距 */
            font-size: 14px; /* 字体大小 */
            color: #666; /* 灰色文字 */
            cursor: pointer; /* 鼠标指针变为手型 */
        }

        /* 微信登录前的绿色圆形图标 */
        .wechat-login::before {
            content: ""; /* 空内容 */
            width: 20px; /* 宽度 */
            height: 20px; /* 高度 */
            background: #07c160; /* 微信绿色 */
            border-radius: 50%; /* 圆形 */
        }
    </style>
</head>
<body>
    <!-- 登录主容器 -->
    <div class="login-box">
        <!-- 左侧二维码区域 -->
        <div class="left">
            <div class="logo">微博</div>
            <div class="title">扫描二维码登录</div>
            <!-- 二维码容器-->
            <div class="qrcode">
                <img src="微信.jpg" alt="微信二维码">
            </div>
            <div class="tip">打开微博手机APP - 我的页面 - 扫一扫</div>
            
            <!-- 新增：个人信息展示区域 -->
            <div class="user-info">
                <div class="info-title">个人信息</div>
                <div class="info-content">
                    学号：210031502009<br>
                    姓名：杜博文
                </div>
            </div>
        </div>

        <!-- 右侧登录表单区域 -->
        <div class="right">
            <!-- 登录选项卡 -->
            <div class="tab">
                <span class="active">验证码登录</span>
                <span>账号登录</span>
            </div>
            
            <!-- 手机号输入框 -->
            <div class="form-item">
                <input type="text" placeholder="手机号">
            </div>
            
            <!-- 验证码输入区域 -->
            <div class="form-item">
                <div class="code-box">
                    <input type="text" placeholder="验证码">
                    <button>获取验证码</button>
                </div>
            </div>
            
            <!-- 登录/注册按钮 -->
            <button class="submit-btn">登录/注册</button>
            
            <!-- 用户协议提示 -->
            <div class="agreement">
                未注册手机验证后自动登录，注册即代表同意《用户协议》《隐私条款》
            </div>
            
            <!-- 微信登录选项 -->
            <div class="wechat-login">微信登录</div>
        </div>
    </div>
</body>
</html>
